name: Release (manual fallback)

# 主发布流程在 M-JYuan/Koma 仓的 build.yml 里——它会 clone 本仓源码、打包、签名、发 release。
# 这个 workflow 只作为"Koma 流水线挂掉时的本地手动备用"，所以仅 workflow_dispatch 触发。
# 平时不应被使用；如果意外双发了，Koma 的版本号校验会把两份的 manifest 都验掉一份。
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why bypassing Koma build.yml? (for audit)'
        required: true
        type: string

permissions:
  contents: write

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  npm_config_electron_mirror: https://npmmirror.com/mirrors/electron/

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove China mirror config
        run: del .npmrc
        shell: cmd

      - name: Install dependencies
        run: npm run install:all

      - name: Build application
        run: npm run build

      - name: Build Windows NSIS installer
        run: npm run build-w

      - name: Build Windows portable
        run: npm run build-we

      - name: List Windows build outputs
        run: find out -type f | sort
        shell: bash

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          if-no-files-found: error
          path: |
            out/**/*.exe
            out/**/*.blockmap
            out/**/latest*.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove China mirror config
        run: rm -f .npmrc

      - name: Install dependencies
        run: npm run install:all

      - name: Install dmg-license
        run: npm install dmg-license

      - name: Build application
        run: npm run build

      - name: Build macOS (x64)
        run: npm run build-m

      - name: Build macOS (ARM64)
        run: npm run build-m-arm64

      - name: List macOS build outputs
        run: find out -type f | sort

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          if-no-files-found: error
          path: |
            out/**/*.dmg
            out/**/*.zip
            out/**/*.blockmap
            out/**/latest*.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove China mirror config
        run: rm -f .npmrc

      - name: Install dependencies
        run: npm run install:all

      - name: Build application
        run: npm run build

      - name: Build Linux AppImage
        run: npm run build-l

      - name: List Linux build outputs
        run: find out -type f | sort

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          if-no-files-found: error
          path: |
            out/**/*.AppImage
            out/**/*.blockmap
            out/**/latest*.yml

  sign-and-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sign update manifest
        env:
          ASSETS_DIR: ${{ github.workspace }}/artifacts
          APP_VERSION: ${{ steps.ver.outputs.version }}
          CHANNEL: stable
          KOMA_UPDATE_SIGN_KEY: ${{ secrets.KOMA_UPDATE_SIGN_KEY }}
        run: node scripts/sign-update-manifest.cjs

      - name: Create GitHub Release on M-JYuan/Koma
        uses: softprops/action-gh-release@v2
        with:
          repository: M-JYuan/Koma
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: artifacts/*
