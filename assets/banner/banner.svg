<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 475" width="1200" height="475">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a1f"/>
      <stop offset="0.55" stop-color="#141233"/>
      <stop offset="1" stop-color="#1d1a44"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.25" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6a5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6a5cff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#4ab8ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4ab8ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="clap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a08bff"/>
      <stop offset="0.55" stop-color="#6a5cff"/>
      <stop offset="1" stop-color="#3a8fef"/>
    </linearGradient>

    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a3a"/>
      <stop offset="1" stop-color="#0d0d22"/>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a08bff"/>
      <stop offset="1" stop-color="#3a8fef"/>
    </linearGradient>

    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd2ff"/>
    </linearGradient>

    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a08bff"/>
      <stop offset="1" stop-color="#4ab8ff"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="475" fill="url(#bg)"/>
  <rect width="1200" height="475" fill="url(#glow)"/>
  <rect width="1200" height="475" fill="url(#glow2)"/>

  <!-- Decorative film perforations along bottom -->
  <g opacity="0.18" fill="#a08bff">
    <rect x="60"   y="430" width="22" height="14" rx="3"/>
    <rect x="100"  y="430" width="22" height="14" rx="3"/>
    <rect x="140"  y="430" width="22" height="14" rx="3"/>
    <rect x="180"  y="430" width="22" height="14" rx="3"/>
    <rect x="220"  y="430" width="22" height="14" rx="3"/>
    <rect x="260"  y="430" width="22" height="14" rx="3"/>
    <rect x="300"  y="430" width="22" height="14" rx="3"/>
    <rect x="340"  y="430" width="22" height="14" rx="3"/>
    <rect x="380"  y="430" width="22" height="14" rx="3"/>
    <rect x="420"  y="430" width="22" height="14" rx="3"/>
    <rect x="460"  y="430" width="22" height="14" rx="3"/>
    <rect x="500"  y="430" width="22" height="14" rx="3"/>
    <rect x="540"  y="430" width="22" height="14" rx="3"/>
    <rect x="580"  y="430" width="22" height="14" rx="3"/>
    <rect x="620"  y="430" width="22" height="14" rx="3"/>
    <rect x="660"  y="430" width="22" height="14" rx="3"/>
    <rect x="700"  y="430" width="22" height="14" rx="3"/>
    <rect x="740"  y="430" width="22" height="14" rx="3"/>
    <rect x="780"  y="430" width="22" height="14" rx="3"/>
    <rect x="820"  y="430" width="22" height="14" rx="3"/>
    <rect x="860"  y="430" width="22" height="14" rx="3"/>
    <rect x="900"  y="430" width="22" height="14" rx="3"/>
    <rect x="940"  y="430" width="22" height="14" rx="3"/>
    <rect x="980"  y="430" width="22" height="14" rx="3"/>
    <rect x="1020" y="430" width="22" height="14" rx="3"/>
    <rect x="1060" y="430" width="22" height="14" rx="3"/>
    <rect x="1100" y="430" width="22" height="14" rx="3"/>
    <rect x="1140" y="430" width="22" height="14" rx="3"/>
  </g>

  <!-- Logo block (icon-inspired clapperboard with K) -->
  <g transform="translate(110, 95)">
    <!-- Outer rounded square (like app icon) -->
    <rect x="0" y="0" width="285" height="285" rx="62" fill="#0d0d22"/>
    <rect x="0" y="0" width="285" height="285" rx="62" fill="none" stroke="url(#stroke)" stroke-width="2" opacity="0.55"/>

    <!-- Clapperboard top strip -->
    <g transform="translate(38, 60) rotate(-8)">
      <rect x="0" y="0" width="225" height="40" rx="8" fill="url(#clap)"/>
      <!-- white slate teeth -->
      <polygon points="14,4 40,4 28,36 2,36" fill="#ffffff" opacity="0.85"/>
      <polygon points="55,4 81,4 69,36 43,36" fill="#ffffff" opacity="0.85"/>
      <polygon points="96,4 122,4 110,36 84,36" fill="#ffffff" opacity="0.85"/>
      <polygon points="137,4 163,4 151,36 125,36" fill="#ffffff" opacity="0.85"/>
      <polygon points="178,4 204,4 192,36 166,36" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- Board body -->
    <rect x="38" y="115" width="210" height="135" rx="14" fill="url(#board)" stroke="url(#stroke)" stroke-width="3"/>

    <!-- Big K -->
    <g transform="translate(98, 138)" fill="#ffffff">
      <path d="M 0 0 L 22 0 L 22 38 L 60 0 L 88 0 L 50 40 L 92 92 L 62 92 L 30 54 L 22 62 L 22 92 L 0 92 Z"/>
    </g>

    <!-- Sparkle star -->
    <g transform="translate(228, 78)" fill="#ffb84a">
      <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z"/>
    </g>
  </g>

  <!-- Text block -->
  <g transform="translate(470, 0)">
    <!-- Big title -->
    <text x="0" y="190" font-family="-apple-system, 'Helvetica Neue', 'PingFang SC', 'Segoe UI', sans-serif"
          font-size="92" font-weight="800" fill="url(#title)" letter-spacing="-1">
      Koma Studio
    </text>

    <!-- Chinese subtitle -->
    <text x="4" y="248" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
          font-size="30" font-weight="500" fill="url(#accentText)" letter-spacing="2">
      AI 短剧创作工具
    </text>

    <!-- English subtitle -->
    <text x="4" y="285" font-family="-apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif"
          font-size="20" font-weight="400" fill="#a8acc8" letter-spacing="1">
      AI Drama · Short-Video · Storyboard · Timeline · Export
    </text>

    <!-- Divider -->
    <rect x="4" y="312" width="120" height="3" rx="1.5" fill="url(#accentText)"/>

    <!-- Tagline -->
    <text x="4" y="350" font-family="'PingFang SC', 'Hiragino Sans GB', sans-serif"
          font-size="22" font-weight="400" fill="#cfd2ff" letter-spacing="1">
      把一个故事想法，一路推进到一段可发布的视频。
    </text>

    <!-- Tech pills -->
    <g transform="translate(4, 380)" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="14" font-weight="500">
      <g>
        <rect x="0" y="0" width="92" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#a08bff" stroke-opacity="0.5"/>
        <text x="46" y="19" fill="#cfd2ff" text-anchor="middle">Electron</text>
      </g>
      <g transform="translate(102, 0)">
        <rect x="0" y="0" width="78" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#6a8fff" stroke-opacity="0.5"/>
        <text x="39" y="19" fill="#cfd2ff" text-anchor="middle">React 19</text>
      </g>
      <g transform="translate(190, 0)">
        <rect x="0" y="0" width="96" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#4ab8ff" stroke-opacity="0.5"/>
        <text x="48" y="19" fill="#cfd2ff" text-anchor="middle">LangChain</text>
      </g>
      <g transform="translate(296, 0)">
        <rect x="0" y="0" width="62" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#a08bff" stroke-opacity="0.5"/>
        <text x="31" y="19" fill="#cfd2ff" text-anchor="middle">MCP</text>
      </g>
      <g transform="translate(368, 0)">
        <rect x="0" y="0" width="84" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#6a8fff" stroke-opacity="0.5"/>
        <text x="42" y="19" fill="#cfd2ff" text-anchor="middle">ComfyUI</text>
      </g>
      <g transform="translate(462, 0)">
        <rect x="0" y="0" width="76" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#4ab8ff" stroke-opacity="0.5"/>
        <text x="38" y="19" fill="#cfd2ff" text-anchor="middle">FFmpeg</text>
      </g>
    </g>
  </g>

  <!-- Floating sparkles -->
  <g fill="#ffb84a" opacity="0.85">
    <path d="M 1080 90 L 1083 100 L 1093 103 L 1083 106 L 1080 116 L 1077 106 L 1067 103 L 1077 100 Z"/>
  </g>
  <g fill="#a08bff" opacity="0.7">
    <path d="M 1130 200 L 1132 207 L 1139 209 L 1132 211 L 1130 218 L 1128 211 L 1121 209 L 1128 207 Z"/>
  </g>
  <g fill="#4ab8ff" opacity="0.6">
    <path d="M 1060 330 L 1062 336 L 1068 338 L 1062 340 L 1060 346 L 1058 340 L 1052 338 L 1058 336 Z"/>
  </g>
</svg>
